name: Hugo CI/CD

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: 'latest'
        extended: true

    - name: Clean public directory
      run: rm -rf public

    - name: Build
      run: hugo --minify

    - name: Push build to staging branch and open PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Fetch master so we have it locally
        git fetch origin master

        # Create or reset deploy/preview from master (ensures shared history)
        git checkout -B deploy/preview origin/master

        # Remove everything tracked and copy the build output
        git rm -rf . --quiet
        cp -r public/. .
        rm -rf public

        git add -A
        git commit -m "Deploy: Hugo build from develop [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]" \
          || echo "Nothing to commit, build is identical"

        git push origin deploy/preview --force

        # Open PR if not already open
        PR_NUMBER=$(gh pr list \
          --base master \
          --head deploy/preview \
          --state open \
          --json number \
          --jq '.[0].number')

        if [ -z "$PR_NUMBER" ]; then
          echo "Creating PR..."
          gh pr create \
            --base master \
            --head deploy/preview \
            --title "Deploy: Hugo build from develop" \
            --body "Automated deployment triggered by push to \`develop\`."

          PR_NUMBER=$(gh pr list \
            --base master \
            --head deploy/preview \
            --state open \
            --json number \
            --jq '.[0].number')
        else
          echo "PR #$PR_NUMBER already exists, skipping creation"
        fi

        if [ -n "$PR_NUMBER" ]; then
          echo "Enabling auto-merge on PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --auto --merge
        else
          echo "ERROR: PR not found after creation attempt"
          exit 1
        fi